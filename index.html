<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Salo Pooh 🪐</title>
    <style>
        :root {
            --dorado: #d69e2e;
            --dorado-claro: #f6e05e;
        }
        body { 
            margin: 0; 
            padding: 20px;
            font-family: 'Courier New', monospace;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 1s;
        }
        body.dia {
            background: linear-gradient(135deg, #87CEEB 0%, #4682B4 100%);
        }
        body.noche {
            background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
        }
        .container { 
            background: rgba(45, 55, 72, 0.95);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid var(--dorado);
            box-shadow: 0 0 20px rgba(214, 158, 46, 0.3);
            text-align: center;
            max-width: 400px;
            position: relative;
            overflow: hidden;
        }
        body.dia .container {
            background: rgba(255, 255, 255, 0.95);
            color: #2d3748;
        }
        .foto-salo { 
            max-width: 200px; 
            border-radius: 50%;
            border: 3px solid var(--dorado);
            margin-bottom: 20px;
            animation: brilloFoto 2s infinite alternate;
            box-shadow: 0 0 15px var(--dorado);
            cursor: pointer;
            user-select: none;
        }
        @keyframes brilloFoto {
            0% { box-shadow: 0 0 15px var(--dorado), 0 0 30px var(--dorado); }
            100% { box-shadow: 0 0 25px var(--dorado-claro), 0 0 50px var(--dorado-claro); }
        }
        h1 { 
            color: var(--dorado); 
            font-size: 1.8em;
            margin: 10px 0;
            text-shadow: 0 0 10px rgba(214, 158, 46, 0.5);
        }
        .scanner {
            background: #000;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border: 1px solid var(--dorado);
            color: #e2e8f0;
        }
        button {
            background: var(--dorado);
            color: #1a202c;
            border: none;
            padding: 12px 25px;
            margin: 8px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1em;
            transition: 0.3s;
        }
        button:hover {
            background: var(--dorado-claro);
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--dorado-claro);
        }
        button:active {
            transform: scale(0.95);
        }
        #resultado {
            margin-top: 20px;
            font-size: 1.1em;
            min-height: 80px;
            color: var(--dorado-claro);
            text-align: left;
        }
        body.dia #resultado {
            color: #b7791f;
        }
        .parpadeo {
            animation: parpadeo 1s infinite;
        }
        @keyframes parpadeo {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .corazon {
            position: absolute;
            color: #f687b3;
            font-size: 20px;
            animation: flotar 3s linear forwards;
            pointer-events: none;
        }
        @keyframes flotar {
            to {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }
        .contador {
            font-size: 0.8em;
            margin-top: 15px;
            opacity: 0.7;
        }
        .controles-musica {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--dorado);
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2em;
        }
        #certificado {
            display: none;
        }
        .secreto-activado {
            animation: temblor 0.5s;
        }
        @keyframes temblor {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>
    <div class="container" id="contenedor">
        <div class="controles-musica" id="btnMusica" onclick="toggleMusica()">🔇</div>
        <img src="salo1.png?v=3" alt="Salo Pooh" class="foto-salo" id="fotoSalo">
        <h1>🪐 SCANNER SALO POOH 🪐</h1>
        <div class="scanner">
            <p class="parpadeo">>>> Sistema iniciado...</p>
            <p>>>> Detectando nivel de importancia...</p>
        </div>
        
        <button onclick="escanear(1)">Nivel Básico</button>
        <button onclick="escanear(2)">Nivel Avanzado</button>
        <button onclick="escanear(3)">Nivel Saturno 🪐</button>
        <button onclick="generarCertificado()">📜 Certificado</button>
        
        <div id="resultado"></div>
        <div class="contador" id="contadorVisitas"></div>
    </div>

    <canvas id="certificado" width="800" height="600"></canvas>

    <script>
        // 1. TEMA DIA/NOCHE
        const hora = new Date().getHours();
        document.body.className = (hora >= 6 && hora < 18) ? 'dia' : 'noche';

        // 2. CONTADOR DE VISITAS
        let visitas = localStorage.getItem('visitasSalo') || 0;
        visitas++;
        localStorage.setItem('visitasSalo', visitas);
        document.getElementById('contadorVisitas').innerHTML = `>>> Has sido escaneada ${visitas} veces 🧸`;

        // 3. MUSICA DE FONDO - Beat espacial suave
        let audioCtx;
        let musicaActiva = false;
        let osciladores = [];

        function crearMusica() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            function nota(frecuencia, duracion, inicio) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.value = frecuencia;
                gain.gain.setValueAtTime(0.05, inicio);
                gain.gain.exponentialRampToValueAtTime(0.01, inicio + duracion);
                osc.start(inicio);
                osc.stop(inicio + duracion);
                osciladores.push(osc);
            }

            // Loop de música espacial
            function loopMusica() {
                if (!musicaActiva) return;
                const ahora = audioCtx.currentTime;
                const beat = 0.5;
                nota(220, beat*2, ahora);
                nota(277.18, beat*2, ahora + beat);
                nota(329.63, beat*2, ahora + beat*2);
                nota(277.18, beat*2, ahora + beat*3);
                setTimeout(loopMusica, beat * 4000);
            }
            loopMusica();
        }

        function toggleMusica() {
            if (!audioCtx) crearMusica();
            musicaActiva = !musicaActiva;
            document.getElementById('btnMusica').innerHTML = musicaActiva ? '🔊' : '🔇';
            if (musicaActiva && audioCtx.state === 'suspended') audioCtx.resume();
        }

        // 4. SONIDO SCANNER
        function reproducirSonido() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'square';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.2);
        }

        // 5. MODO SECRETO
        let clicksFoto = 0;
        document.getElementById('fotoSalo').addEventListener('click', () => {
            clicksFoto++;
            if (clicksFoto === 5) {
                document.getElementById('contenedor').classList.add('secreto-activado');
                reproducirSonido();
                setTimeout(() => {
                    escribirTexto('>>> MODO SECRETO ACTIVADO 🤫<br>>>> ¿usted me quiere? Así sea un poquitito? 🥺', document.getElementById('resultado'));
                    crearCorazones();
                }, 200);
                setTimeout(() => {
                    document.getElementById('contenedor').classList.remove('secreto-activado');
                    clicksFoto = 0;
                }, 1000);
            }
        });

        // 6. CORAZONES
        function crearCorazones() {
            const contenedor = document.getElementById('contenedor');
            for(let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const corazon = document.createElement('div');
                    corazon.classList.add('corazon');
                    corazon.innerHTML = '💛';
                    corazon.style.left = Math.random() * 100 + '%';
                    corazon.style.animationDuration = Math.random() * 2 + 2 + 's';
                    contenedor.appendChild(corazon);
                    setTimeout(() => corazon.remove(), 3000);
                }, i * 100);
            }
        }

        // 7. EFECTO MAQUINA DE ESCRIBIR
        function escribirTexto(texto, elemento) {
            elemento.innerHTML = '';
            let i = 0;
            const velocidad = 30;
            function escribir() {
                if (i < texto.length) {
                    elemento.innerHTML += texto.charAt(i);
                    i++;
                    setTimeout(escribir, velocidad);
                }
            }
            escribir();
        }

        // 8. FUNCION ESCANEAR
        function escanear(nivel) {
            if (!audioCtx) crearMusica();
            reproducirSonido();
            const resultado = document.getElementById('resultado');
            let texto = '';
            
            if(nivel === 1) {
                texto = '>>> Resultado: Caerle bien ✓\n>>> Estado: Misión cumplida';
            } else if(nivel === 2) {
                texto = '>>> Resultado: Que piense en mí ✓\n>>> Estado: Ejecutándose 24/7';
            } else if(nivel === 3) {
                texto = '>>> Resultado: ERES MI PLANETA FAVORITO 🪐\n>>> Estado: Sin ti no hay sistema solar\n>>> Nota: Te quiero mucho, Salo Pooh 🧸';
                crearCorazones();
                reproducirSonido();
                setTimeout(reproducirSonido, 150);
            }
            escribirTexto(texto.replace(/\n/g, '<br>'), resultado);
        }

        // 9. CERTIFICADO DESCARGABLE
        function generarCertificado() {
            reproducirSonido();
            const canvas = document.getElementById('certificado');
            const ctx = canvas.getContext('2d');
            
            // Fondo
            const gradient = ctx.createLinearGradient(0, 0, 800, 600);
            gradient.addColorStop(0, '#1a202c');
            gradient.addColorStop(1, '#2d3748');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 800, 600);
            
            // Borde dorado
            ctx.strokeStyle = '#d69e2e';
            ctx.lineWidth = 10;
            ctx.strokeRect(20, 20, 760, 560);
            
            // Texto
            ctx.fillStyle = '#f6e05e';
            ctx.font = 'bold 40px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('CERTIFICADO OFICIAL', 400, 100);
            
            ctx.fillStyle = '#e2e8f0';
            ctx.font = '30px Courier New';
            ctx.fillText('PLANETA FAVORITO', 400, 150);
            
            ctx.font = '60px Courier New';
            ctx.fillText('🪐', 400, 230);
            
            ctx.font = '25px Courier New';
            ctx.fillText('Se certifica que:', 400, 300);
            
            ctx.font = 'bold 35px Courier New';
            ctx.fillStyle = '#d69e2e';
            ctx.fillText('SALO POOH', 400, 350);
            
            ctx.font = '25px Courier New';
            ctx.fillStyle = '#e2e8f0';
            ctx.fillText('Es oficialmente el planeta favorito', 400, 400);
            ctx.fillText('del sistema solar de', 400, 435);
            
            ctx.font = 'italic 20px Courier New';
            ctx.fillText('Firmado: Tu admirador secreto 🧸', 400, 500);
            
            const fecha = new Date().toLocaleDateString('es-CO');
            ctx.font = '18px Courier New';
            ctx.fillText(`Fecha: ${fecha} | Escaneos: ${visitas}`, 400, 540);
            
            // Descargar
            const link = document.createElement('a');
            link.download = 'Certificado_Planeta_Favorito_Salo.png';
            link.href = canvas.toDataURL();
            link.click();
            
            escribirTexto('>>> Certificado generado ✓<br>>>> Descarga iniciada 📜', document.getElementById('resultado'));
        }

        // Activar música al primer click en cualquier lado
        document.body.addEventListener('click', () => {
            if (!musicaActiva && !audioCtx) {
                toggleMusica();
            }
        }, { once: true });
    </script>
</body>
  </html>
