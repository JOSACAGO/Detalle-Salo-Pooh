<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Salo Pooh 🪐</title>
    <style>
        body { 
            margin: 0; 
            padding: 20px;
            background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
            font-family: 'Courier New', monospace;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container { 
            background: rgba(45, 55, 72, 0.9);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #d69e2e;
            box-shadow: 0 0 20px rgba(214, 158, 46, 0.3);
            text-align: center;
            max-width: 400px;
        }
        img { 
            max-width: 200px; 
            border-radius: 50%;
            border: 3px solid #d69e2e;
            margin-bottom: 20px;
        }
        h1 { 
            color: #d69e2e; 
            font-size: 1.8em;
            margin: 10px 0;
        }
        .scanner {
            background: #000;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border: 1px solid #d69e2e;
        }
        button {
            background: #d69e2e;
            color: #1a202c;
            border: none;
            padding: 12px 25px;
            margin: 8px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1em;
            transition: 0.3s;
        }
        button:hover {
            background: #f6e05e;
            transform: scale(1.05);
        }
        #resultado {
            margin-top: 20px;
            font-size: 1.1em;
            min-height: 60px;
            color: #f6e05e;
        }
        .parpadeo {
            animation: parpadeo 1s infinite;
        }
        @keyframes parpadeo {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="salo2.png" alt="Salo Pooh">
        <h1>🪐 SCANNER SALO POOH 🪐</h1>
        <div class="scanner">
            <p class="parpadeo">>>> Sistema iniciado...</p>
            <p>>>> Detectando nivel de importancia...</p>
        </div>
        
        <button onclick="escanear(1)">Nivel Básico</button>
        <button onclick="escanear(2)">Nivel Avanzado</button>
        <button onclick="escanear(3)">Nivel Saturno 🪐</button>
        
        <div id="resultado"></div>
    </div>

    <script>
        function escanear(nivel) {
            let texto = '';
            if(nivel === 1) {
                texto = '>>> Resultado: Caerle bien ✓ <br> >>> Estado: Misión cumplida';
            } else if(nivel === 2) {
                texto = '>>> Resultado: Que piense en mí ✓ <br> >>> Estado: Ejecutándose 24/7';
            } else if(nivel === 3) {
                texto = '>>> Resultado: ERES MI PLANETA FAVORITO 🪐 <br> >>> Estado: Sin ti no hay sistema solar <br> >>> Nota: Te quiero mucho, Salo Pooh 🧸';
            }
            document.getElementById('resultado').innerHTML = texto;
        }
    </script>
</body>
</html>
